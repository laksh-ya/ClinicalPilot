services:
  - type: web
    name: clinicalpilot
    runtime: python
    region: oregon
    plan: starter
    healthCheckPath: /api/health
    buildCommand: |
      pip install --upgrade pip
      pip install torch --index-url https://download.pytorch.org/whl/cpu
      pip install -r requirements.txt
      pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_lg-3.7.1/en_core_web_lg-3.7.1-py3-none-any.whl
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Secrets (Render prompts you to enter these) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: FDA_API_KEY
        sync: false
      # ── Runtime ──
      - key: PYTHON_VERSION
        value: "3.11.9"
      # ── LLM Config ──
      - key: OPENAI_MODEL
        value: "gpt-4o"
      - key: OPENAI_FAST_MODEL
        value: "gpt-4o-mini"
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: USE_LOCAL_LLM
        value: "false"
      # ── Observability ──
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: LANGCHAIN_PROJECT
        value: "clinicalpilot"
      # ── App Settings ──
      - key: LOG_LEVEL
        value: "INFO"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: EMERGENCY_TIMEOUT_SEC
        value: "5"
      - key: MAX_DEBATE_ROUNDS
        value: "3"
      # ── Data Paths ──
      - key: LANCEDB_PATH
        value: "data/lancedb"
      - key: DRUGBANK_CSV_PATH
        value: "data/drugbank/drugbank_vocabulary.csv"
      - key: SPACY_MODEL
        value: "en_core_web_lg"

<style>
/* ── Reset & Base ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{font-family:'Inter',system-ui,sans-serif;background:#09090b;color:#fafafa;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:99px}

::selection{background:rgba(59,130,246,.25);color:#fff}

/* ── Splash ───────────────────────────────────── */
#splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#09090b;transition:opacity .6s,visibility .6s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash .logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;animation:splashPulse 1.5s ease-in-out infinite}
#splash .bar{width:120px;height:3px;background:#27272a;border-radius:99px;margin-top:24px;overflow:hidden}
#splash .bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;animation:splashBar 1.8s ease-in-out forwards}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes splashBar{0%{width:0}100%{width:100%}}

/* ── Animations ───────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse2{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.3)}50%{box-shadow:0 0 0 8px rgba(59,130,246,0)}}
@keyframes micRing{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}100%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
@keyframes gentleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.anim-fade-up{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
.anim-fade-in{animation:fadeIn .4s ease both}
.anim-slide-r{animation:slideRight .4s cubic-bezier(.22,1,.36,1) both}
.anim-scale-in{animation:scaleIn .35s cubic-bezier(.22,1,.36,1) both}
.anim-d1{animation-delay:.06s}.anim-d2{animation-delay:.12s}.anim-d3{animation-delay:.18s}.anim-d4{animation-delay:.24s}.anim-d5{animation-delay:.3s}

/* ── Components ───────────────────────────────── */
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.1);border-top-color:#60a5fa;border-radius:50%;animation:spin .55s linear infinite}
.spinner-sm{width:12px;height:12px;border-width:2px}

.shimmer-bg{background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.03) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite}

.card-hover{transition:all .2s cubic-bezier(.22,1,.36,1)}
.card-hover:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,.3);border-color:rgba(59,130,246,.15)}

/* ════════════════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════════════════ */
const ToastCtx=createContext();
function ToastProvider({children}){
  const[ts,set]=useState([]);
  const add=useCallback((msg,type='info')=>{const id=Date.now()+Math.random();set(p=>[...p,{id,msg,type}]);setTimeout(()=>set(p=>p.filter(x=>x.id!==id)),4200)},[]);
  const cls={error:'border-rose-500/40 bg-rose-500/10 text-rose-300',success:'border-emerald-500/40 bg-emerald-500/10 text-emerald-300',warning:'border-amber-500/40 bg-amber-500/10 text-amber-300',info:'border-brand-500/40 bg-brand-500/10 text-brand-300'};
  return <ToastCtx.Provider value={add}>{children}
    <div className="fixed bottom-6 right-6 z-[300] space-y-2 max-w-sm pointer-events-none">
      {ts.map(t=><div key={t.id} className={`pointer-events-auto anim-fade-up px-4 py-3 rounded-xl border font-medium text-sm backdrop-blur-md ${cls[t.type]||cls.info}`}>{t.msg}</div>)}
    </div>
  </ToastCtx.Provider>;
}
const useToast=()=>useContext(ToastCtx);

/* ════════════════════════════════════════════════════════
   MIC HOOK
   ════════════════════════════════════════════════════════ */
function useMic(onFinal){
  const[on,setOn]=useState(false);
  const ref=useRef(null);
  const supported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  const toggle=useCallback(()=>{
    if(on){ref.current?.stop();setOn(false);return}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
    r.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript;if(e.results[i].isFinal)onFinal(e.results[i][0].transcript)}};
    r.onerror=()=>setOn(false);r.onend=()=>setOn(false);
    r.start();ref.current=r;setOn(true);
  },[on,onFinal]);
  return{on,toggle,supported};
}

/* ════════════════════════════════════════════════════════
   MIC BUTTON (prominent, outside textarea)
   ════════════════════════════════════════════════════════ */
function MicBtn({onTranscript,className=''}){
  const t=useToast();
  const{on,toggle,supported}=useMic(useCallback(text=>{onTranscript(text)},[onTranscript]));
  if(!supported)return null;
  return <button onClick={()=>{toggle();if(!on)t('Listening — speak now','info')}} className={`mic-btn ${on?'active':''} ${className}`} title={on?'Stop dictation':'Voice input'}>
    <Ic name="mic" size={20}/>
  </button>;
}

const SOAP_SEC=[
  {key:'subjective',label:'Subjective',tag:'S',bar:'bar-s',accent:'#2563eb'},
  {key:'objective',label:'Objective',tag:'O',bar:'bar-o',accent:'#059669'},

  {key:'plan',label:'Plan',tag:'P',bar:'bar-p',accent:'#7c3aed'},
];

function ClinicalReport({soap,debate,medPanel,onExport,onFeedback}){
  const[editing,setEditing]=useState(false);
  const[fbText,setFbText]=useState('');
  const[fbBusy,setFbBusy]=useState(false);
  const reportRef=useRef(null);
  const conf=(soap?.uncertainty||'medium').toLowerCase();

  const handleExportPDF=useCallback(()=>{
    if(!reportRef.current)return;
    const opt={margin:[10,10],filename:`ClinicalPilot_Report_${new Date().toISOString().slice(0,10)}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};
    html2pdf().set(opt).from(reportRef.current).save();
  },[]);

  const handleFeedback=useCallback(async()=>{
    if(!fbText.trim())return;
    setFbBusy(true);
    await onFeedback(fbText);
    setFbText('');setFbBusy(false);
  },[fbText,onFeedback]);

  if(!soap)return null;

  const ints=medPanel?.drug_interactions||[];
  const contras=medPanel?.contraindications||[];
  const dosing=medPanel?.dosing_alerts||[];
  const popFlags=medPanel?.population_flags||[];
  const totalAlerts=ints.length+contras.length+dosing.length+popFlags.length;

  return <div className="space-y-5 anim-fade-up">
    {/* Action bar */}
    <div className="flex flex-wrap items-center gap-2 no-print">
      <button onClick={handleExportPDF} className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition shadow-lg shadow-brand-600/20">
        <Ic name="download" size={15}/>Export PDF
      </button>
      <button onClick={()=>window.print()} className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium transition border border-zinc-700">
        <Ic name="printer" size={15}/>Print
      </button>
      <button onClick={()=>{ const s=soap; const t=`SOAP Note — ClinicalPilot\n${'═'.repeat(40)}\n\nSubjective:\n${s.subjective||'N/A'}\n\nObjective:\n${s.objective||'N/A'}\n\nAssessment:\n${s.assessment||'N/A'}\n\nPlan:\n${s.plan||'N/A'}\n\nUncertainty: ${s.uncertainty||'N/A'}\nGenerated: ${new Date().toISOString()}`; navigator.clipboard.writeText(t); }}
        className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium transition border border-zinc-700">
        <Ic name="copy" size={15}/>Copy
      </button>
      <button onClick={()=>setEditing(!editing)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-sm font-medium transition border border-zinc-700">
        <Ic name="edit" size={15}/>{editing?'Lock':'Edit'}
      </button>
    </div>

    {/* ── THE PAPER REPORT ── */}
    <div ref={reportRef} className="pdf-target">
      <div className="report-paper p-6 sm:p-10">
        {/* Header */}
        <div className="flex items-start justify-between border-b-2 border-zinc-200 pb-5 mb-6">
          <div>
            <h2 className="text-2xl font-display font-bold text-zinc-900 tracking-tight">Clinical Assessment Report</h2>
            <p className="text-sm text-zinc-500 mt-1 font-medium">Generated by ClinicalPilot — Multi-Agent AI Decision Support</p>
          </div>
          <div className="text-right shrink-0">
            <p className="text-xs text-zinc-400">Date</p>
            <p className="text-sm font-semibold text-zinc-700">{new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</p>
            <span className={`inline-block mt-2 text-[10px] font-bold px-2.5 py-1 rounded-full ${conf==='high'?'bg-emerald-100 text-emerald-700':conf==='low'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}`}>
              {conf.toUpperCase()} CONFIDENCE
            </span>
          </div>
        </div>

        {/* SOAP Sections */}
        <div className="space-y-5">
          {SOAP_SEC.map(s=><div key={s.key} className={`${s.bar} pl-5 py-4 rounded-r-lg`} style={{background:`${s.accent}08`}}>
            <div className="flex items-center gap-2 mb-2">
              <span className="w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold" style={{background:s.accent}}>{s.tag}</span>
              <h3 className="text-sm font-bold uppercase tracking-wide" style={{color:s.accent}}>{s.label}</h3>
            </div>
            <div className={`text-[14px] text-zinc-700 leading-[1.7] whitespace-pre-wrap ${editing?'outline outline-2 outline-blue-400/40 rounded-lg p-3 bg-blue-50 cursor-text':''}`}
              contentEditable={editing} suppressContentEditableWarning>{soap[s.key]||'—'}</div>
          </div>)}
        </div>

        {/* Differentials */}
        {soap.differentials?.length>0&&<div className="mt-8 pt-6 border-t-2 border-zinc-200">
          <h3 className="text-sm font-bold text-zinc-900 uppercase tracking-wide mb-4">Differential Diagnoses</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="border-b-2 border-zinc-200">
                <th className="text-left py-2 pr-4 text-zinc-500 font-semibold text-xs uppercase">#</th>
                <th className="text-left py-2 pr-4 text-zinc-500 font-semibold text-xs uppercase">Diagnosis</th>
                <th className="text-left py-2 pr-4 text-zinc-500 font-semibold text-xs uppercase">Likelihood</th>
                <th className="text-left py-2 text-zinc-500 font-semibold text-xs uppercase">Reasoning</th>
              </tr></thead>
              <tbody>{soap.differentials.map((d,i)=><tr key={i} className="border-b border-zinc-100">
                <td className="py-3 pr-4 text-zinc-400 font-mono text-xs">{i+1}</td>
                <td className="py-3 pr-4 font-semibold text-zinc-800">{d.diagnosis||d.name}</td>
                <td className="py-3 pr-4"><span className={`text-xs font-bold px-2 py-0.5 rounded ${(d.likelihood||'').toLowerCase().includes('most')||d.confidence==='high'?'bg-emerald-100 text-emerald-700':d.confidence==='low'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}`}>{d.likelihood||d.confidence}</span></td>
                <td className="py-3 text-zinc-600 text-xs">{d.reasoning}</td>
              </tr>)}</tbody>
            </table>
          </div>
        </div>}

        {/* Risk Scores */}
        {soap.risk_scores&&Object.keys(soap.risk_scores).length>0&&<div className="mt-8 pt-6 border-t-2 border-zinc-200">
          <h3 className="text-sm font-bold text-zinc-900 uppercase tracking-wide mb-4">Risk Scoring</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {Object.entries(soap.risk_scores).map(([k,v])=><div key={k} className="flex items-center justify-between bg-zinc-50 rounded-xl px-4 py-3 border border-zinc-200">
              <span className="text-sm font-medium text-zinc-700">{k}</span>
              <span className="text-sm font-bold font-mono text-blue-700">{v}</span>
            </div>)}
          </div>
        </div>}

        {/* Safety Panel */}
        {totalAlerts>0&&<div className="mt-8 pt-6 border-t-2 border-zinc-200">
          <div className="flex items-center gap-2 mb-4">
            <span className="w-6 h-6 rounded-lg bg-rose-100 flex items-center justify-center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e11d48" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg></span>
            <h3 className="text-sm font-bold text-rose-700 uppercase tracking-wide">Safety Alerts ({totalAlerts})</h3>
          </div>
          {ints.length>0&&<div className="mb-4">
            <p className="text-xs font-bold text-rose-600 mb-2">Drug Interactions</p>
            {ints.map((it,i)=><div key={i} className="bg-rose-50 border border-rose-200 rounded-xl p-3 mb-2 text-xs">
              <div className="flex justify-between"><span className="font-bold text-rose-800">{it.drug_a} × {it.drug_b}</span><span className="font-bold text-rose-600 uppercase text-[10px]">{it.severity}</span></div>
              {it.description&&<p className="text-rose-700 mt-1">{it.description}</p>}
              {it.recommendation&&<p className="text-emerald-700 mt-1 font-medium">→ {it.recommendation}</p>}
            </div>)}
          </div>}
          {contras.length>0&&<div className="mb-4"><p className="text-xs font-bold text-orange-600 mb-2">Contraindications</p>
            {contras.map((it,i)=><div key={i} className="bg-orange-50 border border-orange-200 rounded-xl p-3 mb-2 text-xs">
              <span className="font-bold text-orange-800">{it.drug}</span> — <span className="text-orange-700">{it.disease}</span>
              {it.recommendation&&<p className="text-emerald-700 mt-1">→ {it.recommendation}</p>}
            </div>)}
          </div>}
          {dosing.length>0&&<div className="mb-4"><p className="text-xs font-bold text-amber-600 mb-2">Dosing Alerts</p>
            {dosing.map((it,i)=><div key={i} className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-2 text-xs">
              <span className="font-bold text-amber-800">{it.drug}</span>{it.alert_type&&<span className="text-amber-600 ml-1">[{it.alert_type}]</span>}
              {(it.description||it.message)&&<p className="text-amber-700 mt-1">{it.description||it.message}</p>}
            </div>)}
          </div>}
          {popFlags.length>0&&<div><p className="text-xs font-bold text-blue-600 mb-2">Population Flags</p>
            {popFlags.map((it,i)=><div key={i} className="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-2 text-xs">
              <span className="font-bold text-blue-800">{it.drug}</span> — <span className="text-blue-700">{it.population}</span>
            </div>)}
          </div>}
        </div>}

        {/* Citations */}
        {soap.citations?.length>0&&<div className="mt-8 pt-6 border-t-2 border-zinc-200">
          <h3 className="text-sm font-bold text-zinc-900 uppercase tracking-wide mb-3">Evidence & Citations</h3>
          <ol className="space-y-1.5 list-decimal list-inside">{soap.citations.map((c,i)=><li key={i} className="text-xs text-zinc-600 leading-relaxed">{c}</li>)}</ol>
        </div>}

        {/* Debate Summary */}
        <div className="mt-8 pt-6 border-t-2 border-zinc-200">
          <h3 className="text-sm font-bold text-zinc-900 uppercase tracking-wide mb-3">Multi-Agent Debate Summary</h3>
          <p className="text-sm text-zinc-600 leading-relaxed whitespace-pre-wrap">{soap.debate_summary||debate?.summary||'—'}</p>
          {(soap.dissent_log||debate?.dissent_log||[]).length>0&&<div className="mt-3 flex flex-wrap gap-1.5">{(soap.dissent_log||debate.dissent_log).map((d,i)=><span key={i} className="text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-medium">{d}</span>)}</div>}
        </div>

        {/* Metadata */}
        <div className="mt-8 pt-4 border-t border-zinc-200 flex flex-wrap gap-x-8 gap-y-2 text-[10px] text-zinc-400">
          {debate?.round_number&&<span>Debate Rounds: {debate.round_number}</span>}
          {debate?.final_consensus!=null&&<span>Consensus: {debate.final_consensus?'Reached':'Needs Review'}</span>}
          {soap.model_used&&<span>Model: {soap.model_used}</span>}
          {soap.latency_ms>0&&<span>Latency: {(soap.latency_ms/1000).toFixed(1)}s</span>}
          {soap.total_tokens>0&&<span>Tokens: {soap.total_tokens}</span>}
          <span>ClinicalPilot v2.0 — For research & educational use only</span>
        </div>
      </div>
    </div>

    {/* ── Doctor Feedback (post-report) ── */}
    <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 no-print anim-fade-up">
      <div className="flex items-center gap-3 mb-4">
        <div className="w-10 h-10 rounded-xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center"><Ic name="userCheck" size={20} className="text-violet-400"/></div>
        <div><h3 className="text-base font-display font-bold text-white">Doctor Feedback</h3><p className="text-xs text-zinc-500">Your corrections trigger a full re-debate cycle</p></div>
      </div>
      <div className="flex gap-3 items-start">
        <textarea value={fbText} onChange={e=>setFbText(e.target.value)} placeholder="Add clinical corrections, additional context, or disagree with findings…" rows={3}
          className="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white placeholder:text-zinc-600 resize-y transition focus:border-violet-500/50 focus:ring-2 focus:ring-violet-500/10"/>
        <div className="flex flex-col gap-2">
          <MicBtn onTranscript={t=>setFbText(p=>p+(p?' ':'')+t)} className="shrink-0"/>
          <button onClick={handleFeedback} disabled={fbBusy||!fbText.trim()} className="px-4 py-2.5 rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold transition disabled:opacity-40 flex items-center gap-1.5">
            {fbBusy?<span className="spinner spinner-sm"/>:<Ic name="refresh" size={14}/>}Re-analyze
          </button>
        </div>
      </div>
    </div>
  </div>;
}

   SIDEBAR: Agent Log + Safety flags
   ════════════════════════════════════════════════════════ */
function Sidebar({logs,soap}){
  const ref=useRef(null);
  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight)},[logs]);
  return <div className="space-y-4">
    {/* Agent Log */}
    <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-4 anim-fade-up">
      <div className="flex items-center gap-2 mb-3">
        <div className="flex gap-[5px]"><span className="w-[10px] h-[10px] rounded-full bg-rose-500/60"/><span className="w-[10px] h-[10px] rounded-full bg-amber-500/60"/><span className="w-[10px] h-[10px] rounded-full bg-emerald-500/60"/></div>
        <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest font-mono">Activity</span>
      </div>
      <div ref={ref} className="max-h-60 overflow-y-auto font-mono text-[11px] space-y-0.5">
        {logs.length===0&&<p className="text-zinc-700 italic">$ awaiting input…</p>}
        {logs.map((l,i)=><div key={i} className="flex gap-2 py-0.5 anim-slide-r">
          <span className="text-zinc-700 shrink-0 tabular-nums">{l.time}</span>
          <span className={`shrink-0 ${l.src==='error'?'text-rose-400':l.src==='pipeline'?'text-cyan-400':l.src==='human'?'text-violet-400':l.src==='upload'?'text-emerald-400':'text-brand-400'}`}>{l.src}</span>
          <span className="text-zinc-500 break-words">{l.msg}</span>
        </div>)}
      </div>
    </div>

    {/* Safety flags */}
    {soap?.safety_flags?.length>0&&<div className="rounded-2xl border border-amber-500/20 bg-amber-500/5 p-4 anim-fade-up">
      <div className="flex items-center gap-2 mb-3"><Ic name="alertTri" size={14} className="text-amber-400"/><span className="text-[10px] font-bold text-amber-400 uppercase tracking-wider">Safety Flags</span></div>
      {soap.safety_flags.map((f,i)=><p key={i} className="text-xs text-amber-300/80 pl-3 border-l-2 border-amber-500/20 py-1 mb-1">{typeof f==='string'?f:f.description||JSON.stringify(f)}</p>)}
    </div>}
  </div>;
}

/* ════════════════════════════════════════════════════════
   VIEW: Analysis
   ════════════════════════════════════════════════════════ */
function AnalysisView(){
  const t=useToast();
  const[input,setInput]=useState('');
  const[busy,setBusy]=useState(false);
  const[res,setRes]=useState(null);
  const[steps,setSteps]=useState({});
  const[agentMsgs,setAgentMsgs]=useState([]);
  const[logs,setLogs]=useState([]);
  const taRef=useRef(null);

  const log=useCallback((src,msg)=>{const time=new Date().toLocaleTimeString('en-US',{hour12:false});setLogs(p=>[...p,{time,src,msg}])},[]);
  const addMsg=useCallback((text,type='status')=>setAgentMsgs(p=>[...p,{text,type}]),[]);
  const uStep=useCallback((k,v)=>setSteps(p=>({...p,[k]:v})),[]);
  const allDone=useCallback(()=>PIPELINE_STEPS.forEach(s=>uStep(s.key,'done')),[uStep]);

  const tryWS=useCallback(text=>new Promise(resolve=>{
    const url=`${API.replace('http','ws')}/ws/analyze`;
    let ws;try{ws=new WebSocket(url)}catch{resolve(false);return}
    const to=setTimeout(()=>{ws.close();resolve(false)},4000);
    ws.onopen=()=>{clearTimeout(to);ws.send(JSON.stringify({text}));log('system','WebSocket connected');addMsg('Stream opened')};
    ws.onmessage=ev=>{try{
      const m=JSON.parse(ev.data);
      if(m.type==='status'){
        const d=m.detail||m.stage||'';log('pipeline',d);addMsg(d);
        const s=(m.stage||d).toLowerCase();
        if(s.includes('pars')){uStep('parsing','done');uStep('agents','active')}
        if(s.includes('agent')){uStep('parsing','done');uStep('agents','active')}
        if(s.includes('literature')||s.includes('safety'))addMsg(d,'agent');
        if(s.includes('debate')||s.includes('critic')){uStep('agents','done');uStep('debate','active')}
        if(s.includes('synth')){uStep('debate','done');uStep('synthesis','active')}
        if(s.includes('safety')&&s.includes('panel')){uStep('synthesis','done');uStep('safety_panel','active')}
      }else if(m.type==='agent_result'){log('pipeline',`${m.agent} ✓`);addMsg(`${m.agent} completed`,'agent')}
      else if(m.type==='complete'){allDone();setRes(m);setBusy(false);log('system','✓ Complete');t('Analysis complete','success');resolve(true)}
      else if(m.type==='error'){log('error',m.message||'');t(m.message||'Error','error')}
    }catch{}};
    ws.onerror=()=>{clearTimeout(to);resolve(false)};
    ws.onclose=()=>resolve(false);
  }),[log,addMsg,uStep,allDone,t]);

  const run=useCallback(async()=>{
    if(!input.trim()){t('Enter clinical data','warning');return}
    setBusy(true);setRes(null);setSteps({parsing:'active'});setLogs([]);setAgentMsgs([]);
    log('system','Starting analysis…');addMsg('Initializing pipeline');
    try{
      if(await tryWS(input.trim()))return;
      log('system','REST fallback');
      const r=await fetch(`${API}/api/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:input.trim()})});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||`HTTP ${r.status}`)}
      const data=await r.json();allDone();setRes(data);log('system','✓ Complete');t('Analysis complete','success');
    }catch(e){log('error',e.message);t(e.message,'error');setSteps(p=>{const n={...p};for(const k in n)if(n[k]==='active')n[k]='error';return n})}
    finally{setBusy(false)}
  },[input,tryWS,log,addMsg,allDone,t]);

  const uploadFile=useCallback(async(file,ep)=>{
    try{
      let r;
      if(ep==='/api/upload/fhir')r=await fetch(`${API}${ep}`,{method:'POST',headers:{'Content-Type':'application/json'},body:await file.text()});
      else{const fd=new FormData();fd.append('file',file);r=await fetch(`${API}${ep}`,{method:'POST',body:fd})}
      if(!r.ok)throw new Error('Upload failed');
      const d=await r.json();
      if(d.patient_context){const c=d.patient_context;let s='';if(c.age)s+=`${c.age}-year-old ${c.gender||''}\n`;if(c.conditions?.length)s+=`Conditions: ${c.conditions.map(x=>x.display||x.name||x).join(', ')}\n`;if(c.medications?.length)s+=`Medications: ${c.medications.map(x=>x.name||x).join(', ')}\n`;if(c.allergies?.length)s+=`Allergies: ${c.allergies.map(x=>x.substance||x).join(', ')}\n`;if(c.current_prompt)s+=`\n${c.current_prompt}`;setInput(s.trim())}
      if(d.summary)setInput(p=>p?p+'\n\n'+d.summary:d.summary);
      t(`Parsed ${ep.includes('fhir')?'FHIR bundle':file.name}`,'success');log('upload','File ingested');
    }catch(e){t(e.message,'error')}
  },[t,log]);

  const loadSampleCSV=useCallback(async()=>{
    try{
      const csv=`patient_id,age,gender,condition,medication,dosage,lab_name,lab_value,lab_unit,allergy,vital_name,vital_value
P003,45,male,Hypertension,Metformin,1000mg BID,Troponin I,0.82,ng/mL,,BP,160/95
P003,45,male,Type 2 Diabetes,Lisinopril,20mg daily,WBC,11.2,K/uL,Sulfa drugs,HR,110
P003,45,male,Hyperlipidemia,Atorvastatin,40mg daily,Glucose,245,mg/dL,Shellfish,RR,22
P003,45,male,,Aspirin,81mg daily,Creatinine,1.1,mg/dL,,SpO2,94%
P003,45,male,,,,HbA1c,8.2,%,,Temp,98.6`;
      const blob=new Blob([csv],{type:'text/csv'});
      const file=new File([blob],'sample_stemi.csv',{type:'text/csv'});
      const fd=new FormData();fd.append('file',file);
      const r=await fetch(`${API}/api/upload/ehr`,{method:'POST',body:fd});
      if(!r.ok)throw new Error('CSV parse failed');
      const d=await r.json();
      if(d.summary)setInput(d.summary);
      else if(d.patient_context){const c=d.patient_context;let s='';if(c.age)s+=`${c.age}-year-old ${c.gender||''}\n`;if(c.conditions?.length)s+=`Conditions: ${c.conditions.map(x=>x.display||x.name||x).join(', ')}\n`;if(c.medications?.length)s+=`Medications: ${c.medications.map(x=>x.name||x).join(', ')}\n`;setInput(s.trim())}
      t('Sample CSV loaded','success');
    }catch(e){t(e.message,'error')}
  },[t]);

  const loadSampleFHIR=useCallback(async()=>{
    try{
      const r=await fetch(`${API}/api/upload/fhir`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(SAMPLE_FHIR)});
      if(!r.ok)throw new Error('FHIR parse failed');
      const d=await r.json();
      let s=d.summary||'';
      if(d.patient_context){const c=d.patient_context;s='';if(c.age)s+=`${c.age}-year-old ${c.gender||''}\n`;if(c.conditions?.length)s+=`Conditions: ${c.conditions.map(x=>x.display||x.name||x).join(', ')}\n`;if(c.medications?.length)s+=`Medications: ${c.medications.map(x=>x.name||x).join(', ')}\n`;if(c.allergies?.length)s+=`Allergies: ${c.allergies.map(x=>x.substance||x).join(', ')}\n`;if(c.labs?.length)s+=`Labs: ${c.labs.map(x=>`${x.name}: ${x.value} ${x.unit||''}`).join(', ')}\n`;if(c.vitals?.length)s+=`Vitals: ${c.vitals.map(x=>`${x.name}: ${x.value} ${x.unit||''}`).join(', ')}\n`;if(c.current_prompt)s+=`\n${c.current_prompt}`}
      setInput(s.trim()||'Sample FHIR patient loaded');t('FHIR bundle loaded','success');
    }catch(e){t(e.message,'error')}
  },[t]);

  const feedback=useCallback(async fb=>{
    const s=res?.soap;if(!s){t('Run analysis first','warning');return}
    log('human',`Feedback: "${fb.slice(0,50)}…"`);
    try{const r=await fetch(`${API}/api/human-feedback`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({original_text:input,feedback:fb,edited_soap:JSON.stringify(s)})});if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.detail||'Feedback failed')}const d=await r.json();t('Re-analysis complete','success');if(d.soap)setRes(d);}catch(e){t(e.message,'error')}
  },[res,log,t]);

  const soap=res?.soap||(res?.subjective?res:null);
  const debate=res?.debate||{};
  const medPanel=res?.med_error_panel||{};
  const showPipeline=Object.keys(steps).length>0;

  return <div className="max-w-[1400px] mx-auto px-4 sm:px-6 py-6 relative z-10">
    <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
      <div className="lg:col-span-8 space-y-5">
        {/* ── INPUT CARD ── */}
        <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 sm:p-6 anim-fade-up">
          <div className="flex items-center gap-3 mb-5">
            <div className="w-10 h-10 rounded-xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center">
              <Ic name="stethoscope" size={20} className="text-brand-400"/>
            </div>
            <div>
              <h2 className="text-lg font-display font-bold text-white tracking-tight">Clinical Input</h2>
              <p className="text-xs text-zinc-500">Free-text, voice dictation, or upload patient files</p>
            </div>
          </div>

          {/* Textarea + Mic */}
          <div className="flex gap-3">
            <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)} rows={6}
              placeholder="Describe the clinical presentation…&#10;&#10;Include: demographics, chief complaint, PMH, medications, vitals, labs, physical exam, allergies"
              className="flex-1 bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3.5 text-[15px] text-white placeholder:text-zinc-600 resize-y transition leading-relaxed font-body"
              onKeyDown={e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();run()}}}/>
            <div className="flex flex-col gap-2 shrink-0">
              <MicBtn onTranscript={text=>setInput(p=>p+(p&&!p.endsWith(' ')?' ':'')+text)}/>
              <span className="text-[9px] text-zinc-600 text-center leading-tight">Voice<br/>Input</span>
            </div>
          </div>

          {/* Upload + sample actions */}
          <div className="mt-4 flex flex-wrap gap-2">
            <label className="cursor-pointer flex items-center gap-1.5 px-3 py-2 rounded-xl bg-zinc-800/50 border border-zinc-700 text-xs text-zinc-400 hover:text-white hover:border-zinc-600 transition">
              <Ic name="upload" size={13}/>PDF / CSV
              <input type="file" accept=".pdf,.csv" className="hidden" onChange={e=>e.target.files[0]&&uploadFile(e.target.files[0],'/api/upload/ehr')}/>
            </label>
            <label className="cursor-pointer flex items-center gap-1.5 px-3 py-2 rounded-xl bg-zinc-800/50 border border-zinc-700 text-xs text-zinc-400 hover:text-white hover:border-zinc-600 transition">
              <Ic name="share" size={13}/>FHIR Bundle
              <input type="file" accept=".json" className="hidden" onChange={e=>e.target.files[0]&&uploadFile(e.target.files[0],'/api/upload/fhir')}/>
            </label>
            <div className="h-6 w-px bg-zinc-800 mx-1 self-center"/>
            <button onClick={()=>{setInput(SAMPLES[Math.floor(Math.random()*SAMPLES.length)]);t('Sample case loaded','info')}}
              className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-zinc-800/50 border border-zinc-700 text-xs text-zinc-400 hover:text-white hover:border-zinc-600 transition">
              <Ic name="fileText" size={13}/>Sample Case
            </button>
            <button onClick={loadSampleFHIR}
              className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-zinc-800/50 border border-zinc-700 text-xs text-zinc-400 hover:text-white hover:border-zinc-600 transition">
              <Ic name="globe" size={13}/>Sample FHIR
            </button>
            <button onClick={loadSampleCSV}
              className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-zinc-800/50 border border-zinc-700 text-xs text-zinc-400 hover:text-white hover:border-zinc-600 transition">
              <Ic name="barChart" size={13}/>Sample CSV
            </button>
          </div>

          {/* Run */}
          <div className="mt-5 flex items-center gap-3">
            <button onClick={run} disabled={busy}
              className="flex items-center gap-2.5 px-7 py-3 rounded-xl text-[15px] font-display font-bold text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed"
              style={{background:busy?'#27272a':'linear-gradient(135deg,#2563eb,#3b82f6)',boxShadow:busy?'none':'0 4px 24px rgba(37,99,235,.3)'}}>
              {busy?<><span className="spinner"/>Analyzing…</>:<><Ic name="play" size={17}/>Run Analysis</>}
            </button>
            <button onClick={()=>{setInput('');setRes(null);setSteps({});setLogs([]);setAgentMsgs([])}}
              className="flex items-center gap-1.5 px-4 py-3 rounded-xl text-sm text-zinc-500 hover:text-zinc-300 bg-zinc-800/40 hover:bg-zinc-800 border border-zinc-800 transition">
              <Ic name="trash" size={14}/>Clear
            </button>
            <span className="text-[10px] text-zinc-600 ml-auto hidden sm:flex items-center gap-1"><kbd className="px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-500 font-mono text-[9px] border border-zinc-700">⌘ Enter</kbd></span>
          </div>
        </div>

        {showPipeline&&!soap&&<PipelineViz steps={steps} msgs={agentMsgs}/>}

        {soap&&<ClinicalReport soap={soap} debate={debate} medPanel={medPanel} onFeedback={feedback}/>}
      </div>

      {/* Sidebar */}
      <div className="lg:col-span-4"><Sidebar logs={logs} soap={soap}/></div>
    </div>
  </div>;
}

/* ════════════════════════════════════════════════════════
   VIEW: Emergency
   ════════════════════════════════════════════════════════ */
function EmergencyView(){
  const t=useToast();
  const[input,setInput]=useState('');
  const[busy,setBusy]=useState(false);
  const[em,setEm]=useState(null);
  const[lat,setLat]=useState(null);

  const run=useCallback(async()=>{
    if(!input.trim()){t('Describe the emergency','warning');return}
    setBusy(true);setEm(null);const t0=performance.now();
    try{
      const r=await fetch(`${API}/api/emergency`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:input.trim()})});
      if(!r.ok)throw new Error((await r.json().catch(()=>({}))).detail||`HTTP ${r.status}`);
      const d=await r.json();setLat(((performance.now()-t0)/1000).toFixed(1));setEm(d.emergency||d);t('Triage complete','success');
    }catch(e){t(e.message,'error')}finally{setBusy(false)}
  },[input,t]);

  return <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8 relative z-10">
    <div className="rounded-2xl border border-rose-500/15 bg-zinc-900/50 p-6 sm:p-8 anim-fade-up">
      <div className="text-center mb-6">
        <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-rose-500/10 border border-rose-500/15 mb-3"><Ic name="zap" size={32} className="text-rose-400"/></div>
        <h2 className="text-3xl font-display font-bold text-white tracking-tight">Emergency Triage</h2>
        <p className="text-sm text-zinc-500 mt-2">Fast-path — bypasses debate, targets &lt;15s</p>
      </div>
      <div className="flex gap-3">
        <textarea value={input} onChange={e=>setInput(e.target.value)} rows={4}
          placeholder="Describe the emergency…"
          className="flex-1 bg-zinc-800/50 border-2 border-rose-500/15 rounded-xl px-4 py-3 text-[15px] text-white placeholder:text-zinc-600 resize-y transition"
          onKeyDown={e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();run()}}}/>
        <MicBtn onTranscript={text=>setInput(p=>p+(p?' ':'')+text)}/>
      </div>
      <button onClick={run} disabled={busy} className="mt-4 w-full py-4 rounded-xl text-white text-lg font-display font-bold transition-all disabled:opacity-50 flex items-center justify-center gap-3"
        style={{background:busy?'#3f3f46':'linear-gradient(135deg,#dc2626,#ea580c)',boxShadow:busy?'none':'0 4px 24px rgba(220,38,38,.25)'}}>
        {busy?<><span className="spinner"/>TRIAGING…</>:<><Ic name="zap" size={22}/>TRIAGE NOW</>}
      </button>

      {em&&<div className="mt-8 space-y-5 anim-fade-up">
        <div className="text-center">
          <div className="inline-flex flex-col items-center">
            <span className="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">ESI Level</span>
            <div className={`w-24 h-24 rounded-2xl flex items-center justify-center text-5xl font-display font-black text-white esi-${em.esi_score||3}`}>{em.esi_score||'?'}</div>
            <span className="text-xs text-zinc-500 mt-2 flex items-center gap-1"><Ic name="clock" size={12}/>{lat}s</span>
          </div>
        </div>

        {em.top_differentials?.length>0&&<div>
          <h3 className="text-xs font-bold text-rose-400 uppercase tracking-wider mb-2">Top Differentials</h3>
          <div className="space-y-1.5">{em.top_differentials.map((d,i)=>{const nm=typeof d==='string'?d:d.diagnosis||d.name;const cf=typeof d==='string'?'':d.likelihood||d.confidence||'';return<div key={i} className="flex items-center justify-between bg-zinc-800 rounded-xl px-4 py-3 border border-zinc-700"><span className="text-sm text-white font-medium">{nm}</span>{cf&&<span className="text-xs text-zinc-400">{String(cf)}</span>}</div>})}</div>
        </div>}

        {em.red_flags?.length>0&&<div className="p-4 rounded-xl bg-rose-500/[.06] border border-rose-500/15">
          <h3 className="text-xs font-bold text-rose-400 uppercase tracking-wider mb-2">🚩 Red Flags</h3>
          <ul className="space-y-1.5">{em.red_flags.map((f,i)=><li key={i} className="text-sm text-rose-300 flex items-start gap-2"><span className="shrink-0 mt-0.5">⚠</span>{f}</li>)}</ul>
        </div>}

        <div className="p-4 rounded-xl bg-amber-500/[.06] border border-amber-500/15">
          <h3 className="text-xs font-bold text-amber-400 uppercase tracking-wider mb-2">Immediate Action</h3>
          <p className="text-white text-sm font-semibold">{em.call_to_action||'Immediate medical evaluation required'}</p>
        </div>

        {em.safety_flags?.length>0&&<div className="p-4 rounded-xl bg-orange-500/[.06] border border-orange-500/15">
          <h3 className="text-xs font-bold text-orange-400 uppercase tracking-wider mb-2">Safety</h3>
          <ul className="space-y-1">{em.safety_flags.map((f,i)=><li key={i} className="text-sm text-orange-300">{typeof f==='string'?f:f.description}</li>)}</ul>
        </div>}
      </div>}
    </div>
  </div>;
}

/* ════════════════════════════════════════════════════════
   VIEW: Tools
   ════════════════════════════════════════════════════════ */
function ToolsView(){
  const t=useToast();
  const[drugs,setDrugs]=useState('');const[drugRes,setDrugRes]=useState(null);const[drugBusy,setDrugBusy]=useState(false);
  const[calcTab,setCalcTab]=useState('bmi');const[cv,setCv]=useState({w:'',h:'',s:'',d:''});
  const cs=(k,v)=>setCv(p=>({...p,[k]:v}));
  const bmi=useMemo(()=>{const w=+cv.w,h=+cv.h/100;return w&&h?(w/(h*h)).toFixed(1):null},[cv.w,cv.h]);
  const map=useMemo(()=>{const s=+cv.s,d=+cv.d;return s&&d?((s+2*d)/3).toFixed(0):null},[cv.s,cv.d]);

  return <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6 relative z-10 space-y-5">
    <div className="anim-fade-up">
      <h2 className="text-2xl font-display font-bold text-white tracking-tight">Clinical Tools</h2>
      <p className="text-sm text-zinc-500 mt-1">Drug interactions, calculators & quick reference</p>
    </div>
    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
      {/* Drug checker */}
      <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 anim-fade-up">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-xl bg-rose-500/10 border border-rose-500/20 flex items-center justify-center"><Ic name="pill" size={20} className="text-rose-400"/></div>
          <div><h3 className="text-base font-display font-bold text-white">Drug Interaction Checker</h3><p className="text-[11px] text-zinc-500">RxNorm + DrugBank</p></div>
        </div>
        <div className="flex gap-2">
          <input value={drugs} onChange={e=>setDrugs(e.target.value)} placeholder="metformin, lisinopril, aspirin…"
            className="flex-1 bg-zinc-800/50 border border-zinc-700 rounded-xl px-3 py-2.5 text-sm text-white placeholder:text-zinc-600 transition"
            onKeyDown={e=>{if(e.key==='Enter'){setDrugBusy(true);setDrugRes(null);fetch(`${API}/api/safety-check?drugs=${encodeURIComponent(drugs)}`).then(r=>r.json()).then(d=>{setDrugRes(d);t('Check complete','success')}).catch(e=>t(e.message,'error')).finally(()=>setDrugBusy(false))}}}/>
          <MicBtn onTranscript={text=>setDrugs(p=>p+(p?', ':'')+text)}/>
        </div>
        <button onClick={()=>{if(!drugs.trim()){t('Enter drugs','warning');return}setDrugBusy(true);setDrugRes(null);fetch(`${API}/api/safety-check?drugs=${encodeURIComponent(drugs)}`).then(r=>r.json()).then(d=>{setDrugRes(d);t('Check complete','success')}).catch(e=>t(e.message,'error')).finally(()=>setDrugBusy(false))}}
          disabled={drugBusy} className="mt-3 w-full py-2.5 rounded-xl bg-rose-600 hover:bg-rose-500 text-white text-sm font-semibold transition disabled:opacity-40 flex items-center justify-center gap-2">
          {drugBusy?<><span className="spinner spinner-sm"/>Checking…</>:<><Ic name="search" size={15}/>Check Interactions</>}
        </button>
        {drugRes&&<div className="mt-3 space-y-2 anim-fade-up">
          {Array.isArray(drugRes.rxnorm_interactions)&&drugRes.rxnorm_interactions.length>0?drugRes.rxnorm_interactions.map((r,i)=><div key={i} className="p-3 rounded-xl bg-rose-500/5 border border-rose-500/10 text-xs text-rose-300">{r.description||JSON.stringify(r)}</div>):
          <p className="text-xs text-emerald-400">✓ No RxNorm interactions found</p>}
        </div>}
      </div>

      {/* Calculator */}
      <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 anim-fade-up anim-d1">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center"><Ic name="calculator" size={20} className="text-brand-400"/></div>
          <h3 className="text-base font-display font-bold text-white">Medical Calculators</h3>
        </div>
        <div className="flex gap-1 mb-4">{[{id:'bmi',l:'BMI'},{id:'map',l:'MAP'}].map(c=><button key={c.id} onClick={()=>setCalcTab(c.id)} className="tab-pill px-3 py-1.5 rounded-lg text-xs font-medium border border-transparent" data-active={calcTab===c.id?'true':'false'}>{c.l}</button>)}</div>
        {calcTab==='bmi'?<div className="space-y-3">
          <div><label className="text-[10px] text-zinc-500 font-medium">Weight (kg)</label><input value={cv.w} onChange={e=>cs('w',e.target.value)} placeholder="70" type="number" className="w-full bg-zinc-800/50 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white mt-1 transition"/></div>
          <div><label className="text-[10px] text-zinc-500 font-medium">Height (cm)</label><input value={cv.h} onChange={e=>cs('h',e.target.value)} placeholder="175" type="number" className="w-full bg-zinc-800/50 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white mt-1 transition"/></div>
          {bmi&&<div className="p-3 rounded-xl bg-brand-500/10 border border-brand-500/20 anim-scale-in"><p className="text-sm text-brand-300 font-bold">BMI: {bmi} — {bmi<18.5?'Underweight':bmi<25?'Normal':bmi<30?'Overweight':'Obese'}</p></div>}
        </div>:
        <div className="space-y-3">
          <div><label className="text-[10px] text-zinc-500 font-medium">Systolic BP</label><input value={cv.s} onChange={e=>cs('s',e.target.value)} placeholder="120" type="number" className="w-full bg-zinc-800/50 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white mt-1 transition"/></div>
          <div><label className="text-[10px] text-zinc-500 font-medium">Diastolic BP</label><input value={cv.d} onChange={e=>cs('d',e.target.value)} placeholder="80" type="number" className="w-full bg-zinc-800/50 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white mt-1 transition"/></div>
          {map&&<div className="p-3 rounded-xl bg-brand-500/10 border border-brand-500/20 anim-scale-in"><p className="text-sm text-brand-300 font-bold">MAP: {map} mmHg — {map<65?'⚠ Hypotension':map>100?'⚠ Hypertension':'Normal'}</p></div>}
        </div>}
      </div>
    </div>
    {/* Reference */}
    <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 anim-fade-up anim-d2">
      <h3 className="text-base font-display font-bold text-white mb-4">Quick Reference</h3>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        {[{title:'Normal Vitals',items:['HR: 60–100 bpm','BP: 90/60 – 120/80','RR: 12–20/min','Temp: 97.8–99.1°F','SpO2: >95%']},{title:'Critical Labs',items:['Troponin: <0.04 ng/mL','INR: 2.0–3.0 (warfarin)','D-dimer: <0.5 μg/mL','Creatinine: 0.7–1.3 mg/dL','WBC: 4.5–11.0 K/μL']},{title:'ESI Levels',items:['1 — Resuscitation','2 — Emergent','3 — Urgent','4 — Less Urgent','5 — Non-urgent']}].map((s,i)=>
          <div key={i} className="bg-zinc-800/40 border border-zinc-800 rounded-xl p-4">
            <h4 className="text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wide">{s.title}</h4>
            <ul className="space-y-1">{s.items.map((it,j)=><li key={j} className="text-[12px] text-zinc-500 font-mono">{it}</li>)}</ul>
          </div>
        )}
      </div>
    </div>
  </div>;
}

/* ════════════════════════════════════════════════════════
   VIEW: Architecture
   ════════════════════════════════════════════════════════ */
function ArchView(){
  const archRef=useRef(null);const flowRef=useRef(null);
  const[tab,setTab]=useState('system');
  useEffect(()=>{mermaid.initialize({startOnLoad:false,theme:'dark',themeVariables:{primaryColor:'#18181b',primaryTextColor:'#fafafa',primaryBorderColor:'#3b82f6',lineColor:'#3f3f46',secondaryColor:'#27272a',tertiaryColor:'#18181b',background:'transparent',mainBkg:'#18181b',nodeBorder:'#3b82f6',clusterBkg:'rgba(24,24,27,.5)',clusterBorder:'rgba(59,130,246,.3)',fontSize:'12px',fontFamily:'DM Sans,sans-serif'}})},[]);
  useEffect(()=>{const el=tab==='system'?archRef.current:flowRef.current;const d=tab==='system'?ARCH_DIAGRAM:FLOW_DIAGRAM;if(el){el.innerHTML='';mermaid.render(`mm-${tab}-${Date.now()}`,d).then(({svg})=>el.innerHTML=svg).catch(()=>el.innerHTML='<p style="color:#71717a">Diagram render failed</p>')}},[tab]);

  return <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6 relative z-10">
    <div className="mb-6 anim-fade-up"><h2 className="text-2xl font-display font-bold text-white tracking-tight">System Architecture</h2><p className="text-sm text-zinc-500 mt-1">Multi-agent pipeline with debate-driven reasoning</p></div>
    <div className="flex gap-1 mb-5 anim-fade-up">{[{id:'system',l:'System Overview'},{id:'flow',l:'Data Flow'}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} className="tab-pill px-4 py-2 rounded-xl text-sm font-medium border border-transparent" data-active={tab===t.id?'true':'false'}>{t.l}</button>)}</div>
    <div className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 sm:p-6 anim-fade-up overflow-x-auto">
      <div ref={archRef} className={`mermaid min-h-[280px] ${tab!=='system'?'hidden':''}`}/>
      <div ref={flowRef} className={`mermaid min-h-[280px] ${tab!=='flow'?'hidden':''}`}/>
    </div>
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-5">
      {[{t:'AI & Reasoning',c:'text-violet-400',items:['GPT-4o + GPT-4o-mini','Multi-agent debate (3 rounds)','Critic consensus engine','Human-in-the-loop feedback']},{t:'Safety & Data',c:'text-rose-400',items:['Presidio PHI anonymizer','PubMed / Entrez','RxNorm interactions','FDA + DrugBank']},{t:'Infrastructure',c:'text-brand-400',items:['FastAPI + WebSocket','React 18 (CDN)','LanceDB vectors','Pydantic v2 validation']}].map((s,i)=>
        <div key={i} className="rounded-2xl border border-zinc-800 bg-zinc-900/50 p-5 anim-fade-up" style={{animationDelay:`${i*.08}s`}}>
          <h3 className={`text-sm font-display font-bold ${s.c} mb-3`}>{s.t}</h3>
          <ul className="space-y-1.5">{s.items.map((it,j)=><li key={j} className="text-xs text-zinc-500 flex items-center gap-2"><span className="w-1 h-1 rounded-full bg-zinc-700 shrink-0"/>{it}</li>)}</ul>
        </div>
      )}
    </div>
  </div>;
}

/* ════════════════════════════════════════════════════════
   VIEW: AI Chat Assistant
   ════════════════════════════════════════════════════════ */
function ChatView(){
  const t=useToast();
  const[msgs,setMsgs]=useState([{role:'assistant',content:'Hello! I\'m ClinicalPilot AI — powered by Llama 3.3 70B via Groq. I can help with clinical questions, drug interactions, differential diagnoses, lab interpretation, and guideline lookups. How can I help you today?'}]);
  const[input,setInput]=useState('');
  const[busy,setBusy]=useState(false);
  const[meta,setMeta]=useState(null);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=useCallback(async()=>{
    if(!input.trim()||busy)return;
    const userMsg=input.trim();setInput('');
    const newMsgs=[...msgs,{role:'user',content:userMsg}];
    setMsgs(newMsgs);setBusy(true);
    try{
      // Send conversation history to Groq-powered /api/chat
      const history=newMsgs.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}));
      const r=await fetch(`${API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
      if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.detail||`HTTP ${r.status}`)}
      const d=await r.json();
      setMsgs(p=>[...p,{role:'assistant',content:d.reply}]);
      setMeta({model:d.model,latency:d.latency_ms,tokens:d.tokens});
    }catch(e){setMsgs(p=>[...p,{role:'assistant',content:`Sorry, I encountered an error: ${e.message}. Please try again.`}]);t(e.message,'error')}
    finally{setBusy(false)}
  },[input,busy,msgs,t]);

  return <div className="max-w-3xl mx-auto px-4 sm:px-6 py-6 relative z-10 flex flex-col" style={{height:'calc(100vh - 80px)'}}>
    <div className="mb-4 anim-fade-up">
      <div className="flex items-center gap-3">
        <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-brand-600 to-violet-600 flex items-center justify-center shadow-lg shadow-brand-600/20">
          <Ic name="sparkles" size={24} className="text-white"/>
        </div>
        <div><h2 className="text-xl font-display font-bold text-white">AI Clinical Assistant</h2><p className="text-xs text-zinc-500">Powered by Groq (Llama 3.3 70B) — fast, conversational clinical Q&A{meta?<span className="ml-2 text-zinc-600">· {meta.model} · {meta.latency}ms · {meta.tokens} tokens</span>:null}</p></div>
      </div>
    </div>

    {/* Messages */}
    <div className="flex-1 overflow-y-auto space-y-4 pb-4">
      {msgs.map((m,i)=><div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'} anim-fade-up`}>
        <div className={`max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap ${m.role==='user'?'bg-brand-600 text-white rounded-br-md':'bg-zinc-800 text-zinc-200 border border-zinc-700 rounded-bl-md'}`}>{m.content}</div>
      </div>)}
      {busy&&<div className="flex justify-start anim-fade-up"><div className="bg-zinc-800 border border-zinc-700 rounded-2xl rounded-bl-md px-4 py-3 flex items-center gap-2"><span className="spinner spinner-sm"/><span className="text-sm text-zinc-400">Thinking…</span></div></div>}
      <div ref={endRef}/>
    </div>

    {/* Input */}
    <div className="pt-4 border-t border-zinc-800">
      <div className="flex gap-2 mb-2">
        <MicBtn onTranscript={text=>setInput(p=>p+(p?' ':'')+text)}/>
        <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Ask a clinical question…"
          className="flex-1 bg-zinc-800/50 border border-zinc-700 rounded-xl px-4 py-3 text-[15px] text-white placeholder:text-zinc-600 transition"
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}/>
        <button onClick={send} disabled={busy||!input.trim()} className="px-4 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-white transition disabled:opacity-40"><Ic name="send" size={18}/></button>
      </div>
      <div className="flex justify-end mt-1">
        <button onClick={()=>{setMsgs([{role:'assistant',content:'Chat cleared. How can I help?'}]);setMeta(null)}} className="text-[10px] text-zinc-600 hover:text-zinc-400 transition">Clear chat</button>
      </div>
    </div>
  </div>;
}

/* ════════════════════════════════════════════════════════
   APP ROOT
   ════════════════════════════════════════════════════════ */
function App(){
  const[view,setView]=useState('analysis');
  const[online,setOnline]=useState(false);
  const[splashDone,setSplashDone]=useState(false);

  useEffect(()=>{
    const check=()=>fetch(`${API}/api/health`).then(r=>r.json()).then(d=>setOnline(d.status==='ok')).catch(()=>setOnline(false));
    check();const iv=setInterval(check,30000);return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{const t=setTimeout(()=>{document.getElementById('splash')?.classList.add('hide');setSplashDone(true)},2200);return()=>clearTimeout(t)},[]);

  return <ToastProvider>
    <div className="min-h-screen flex flex-col relative">
      <Navbar view={view} setView={setView} online={online}/>
      <main className="flex-1 relative z-10">
        {view==='analysis'&&<AnalysisView/>}
        {view==='emergency'&&<EmergencyView/>}
        {view==='tools'&&<ToolsView/>}
        {view==='classifiers'&&<ClassifiersView/>}
        {view==='architecture'&&<ArchView/>}
        {view==='chat'&&<ChatView/>}
      </main>
      <footer className="relative z-10 text-center py-4 text-[11px] text-zinc-700 border-t border-zinc-800/60 safe-b">
        ClinicalPilot v2 · Multi-Agent Clinical Decision Support · For research & educational use only
      </footer>
    </div>
  </ToastProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
